name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install pytest requests
      - run: python3 -m pytest tests/

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      # NOTE: no registry-url here — setup-node's registry-url writes an
      # .npmrc _authToken placeholder that preempts the OIDC exchange and
      # breaks Trusted Publishing (npm then 404s the PUT as unauthenticated).
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$TAG" ]; then
            echo "Tag '$TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi
          echo "Tag $TAG matches package.json version v$PKG_VERSION"
      # Trusted Publishing (OIDC): no NPM_TOKEN secret. Requires npm >= 11.5.1
      # and a Trusted Publisher configured on npmjs.com for this package
      # (GitHub Actions, repo cruzanstx/cclimits, workflow publish.yml).
      # Provenance is generated automatically with OIDC.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - run: npm publish --access public
